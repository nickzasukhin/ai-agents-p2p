apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  labels:
    app: agent-social-network
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-social-network
  template:
    metadata:
      labels:
        app: agent-social-network
    spec:
      containers:
        - name: agent
          image: ghcr.io/OWNER/agent-social-network:latest
          ports:
            - containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-config
            - secretRef:
                name: agent-secrets
          env:
            - name: PORT
              value: "9000"
            - name: DATA_DIR
              value: /data
            - name: AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: agent-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: agent-data
