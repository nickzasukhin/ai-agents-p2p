services:
  orchestrator:
    build:
      context: ../..
      dockerfile: orchestrator/Dockerfile
    container_name: a2a-orchestrator
    pid: host  # Required for nsenter to reload nginx on host
    privileged: true  # Required for nsenter to access host namespaces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ORCH_HOST: "0.0.0.0"
      ORCH_PORT: "8000"
      ORCH_DB_PATH: /data/orchestrator.db
      ORCH_JWT_SECRET: ${ORCH_JWT_SECRET:-change-me-in-production}
      ORCH_AGENT_IMAGE: a2a-agent:latest
      ORCH_AGENT_DATA_ROOT: /opt/agents/data
      ORCH_DOMAIN: agents.devpunks.io
      ORCH_BASE_URL: https://agents.devpunks.io
      ORCH_NGINX_CONF_DIR: /etc/nginx/conf.d/agents
      ORCH_SEED_NODE_URL: ""
      ORCH_RESEND_API_KEY: ${ORCH_RESEND_API_KEY:-}
      ORCH_EMAIL_FROM: ${ORCH_EMAIL_FROM:-noreply@devpunks.io}
      ORCH_ADMIN_EMAILS: ${ORCH_ADMIN_EMAILS:-[]}
      ORCH_PORT_RANGE_START: "9101"
      ORCH_DOCKER_NETWORK: "production_default"
      # Agent container env vars (passed to spawned containers)
      ORCH_AGENT_OPENAI_API_KEY: ${OPENAI_API_KEY}
      ORCH_AGENT_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ORCH_AGENT_LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      ORCH_AGENT_REGISTRY_URLS: '["https://registry.devpunks.io"]'
      # SSL (wildcard cert for *.agents.devpunks.io)
      ORCH_SSL_CERT_PATH: /etc/letsencrypt/live/agents.devpunks.io/fullchain.pem
      ORCH_SSL_KEY_PATH: /etc/letsencrypt/live/agents.devpunks.io/privkey.pem
    ports:
      - "8002:8000"
    volumes:
      - orchestrator-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/agents/data:/opt/agents/data
      - /etc/nginx/conf.d/agents:/etc/nginx/conf.d/agents
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  registry:
    build:
      context: ../../registry
      dockerfile: Dockerfile
    container_name: a2a-registry
    environment:
      PORT: "8080"
      DATA_DIR: /data
    ports:
      - "8080:8080"
    volumes:
      - registry-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  orchestrator-data:
  registry-data:
