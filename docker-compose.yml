services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      agent-1:
        condition: service_started
    restart: unless-stopped

  agent-1:
    build: .
    environment:
      AGENT_NAME: Agent-Alpha
      PORT: "9000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PEERS: http://agent-2:9000
      DISCOVERY_INTERVAL: "15"
    volumes:
      - agent1-data:/data
      - frontend-dist:/app/frontend/dist
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  agent-2:
    build: .
    environment:
      AGENT_NAME: Agent-Beta
      PORT: "9000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PEERS: http://agent-1:9000
      DISCOVERY_INTERVAL: "15"
    volumes:
      - agent2-data:/data
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  agent1-data:
  agent2-data:
  frontend-dist:
